<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter Tight', sans-serif; background: #0B0F19; color: #F0F4F8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOP NAV */
.tabs { display: flex; background: #111827; border-bottom: 1px solid rgba(255,255,255,0.08); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.45); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; -webkit-user-select: none; }
.tab.active { color: #C8A84B; border-bottom-color: #C8A84B; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

/* CARDS */
.card { background: #1A2535; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
.card-title { font-size: 10px; font-weight: 700; color: #C8A84B; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; margin: 2px; }

/* REEL CARDS */
.reel-card { background: #1A2535; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: rgba(200,168,75,0.1); }
.reel-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.reel-emoji { font-size: 24px; }
.reel-info { flex: 1; }
.reel-stage { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.reel-title { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.reel-hook { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; font-style: italic; }
.reel-arrow { font-size: 16px; color: rgba(255,255,255,0.3); }
.reel-body { display: none; padding: 0 16px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
.reel-body.open { display: block; }

/* TABS INSIDE REEL */
.inner-tabs { display: flex; gap: 0; margin: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.inner-tab { padding: 8px 14px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; -webkit-tap-highlight-color: transparent; }
.inner-tab.active { color: #C8A84B; border-bottom-color: #C8A84B; }

/* SCRIPT TABLE */
.script-row { display: grid; grid-template-columns: 48px 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.script-time { font-family: monospace; font-size: 10px; color: #C8A84B; padding-top: 2px; }
.script-text { font-size: 12px; line-height: 1.5; color: #e0e8f0; }
.script-action { font-size: 10px; color: rgba(255,255,255,0.4); font-style: italic; margin-top: 3px; }

/* FRAME PROMPT CARD */
.frame-card { background: #0d1420; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
.frame-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.frame-num { font-family: monospace; font-size: 9px; color: #C8A84B; background: rgba(200,168,75,0.1); padding: 2px 6px; border-radius: 3px; }
.frame-label { font-size: 11px; font-weight: 700; color: #fff; }
.dialogue { font-size: 11px; color: rgba(255,255,255,0.65); font-style: italic; padding: 6px 10px; background: rgba(200,168,75,0.07); border-left: 2px solid #C8A84B; border-radius: 0 4px 4px 0; margin-bottom: 8px; }
.prompt-box { background: #060a12; border-radius: 5px; padding: 8px; font-family: monospace; font-size: 9px; color: #7aadcc; line-height: 1.6; margin-bottom: 8px; max-height: 80px; overflow-y: auto; word-break: break-word; }
.copy-btn { width: 100%; padding: 8px; background: #0B0F19; color: #C8A84B; border: 1px solid rgba(200,168,75,0.3); border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Inter Tight', sans-serif; -webkit-tap-highlight-color: rgba(200,168,75,0.1); }
.copy-btn:active { background: rgba(200,168,75,0.1); }
.copy-btn.veo { color: #7BA7E0; border-color: rgba(123,167,224,0.3); }

/* CAROUSEL */
.carousel-card { background: #1A2535; border-radius: 10px; padding: 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; -webkit-tap-highlight-color: rgba(200,168,75,0.1); }
.slide-mini { width: 100%; overflow-x: auto; display: flex; gap: 8px; padding-bottom: 8px; scrollbar-width: none; }
.slide-mini::-webkit-scrollbar { display: none; }
.slide-item { flex-shrink: 0; width: 120px; background: #0B0F19; border-radius: 6px; padding: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.06); }
.slide-num { font-size: 8px; color: #C8A84B; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
.slide-headline { font-size: 10px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 4px; }
.slide-sub { font-size: 8px; color: rgba(255,255,255,0.4); line-height: 1.3; }
.slide-line { height: 2px; background: #C8A84B; margin-top: 8px; border-radius: 1px; }

/* BUTTONS */
.btn-gold { background: #C8A84B; color: #0B0F19; border: none; border-radius: 6px; padding: 10px 16px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter Tight', sans-serif; width: 100%; margin-top: 8px; -webkit-tap-highlight-color: transparent; }
.btn-dark { background: #0B0F19; color: #C8A84B; border: 1px solid rgba(200,168,75,0.3); border-radius: 6px; padding: 10px 16px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter Tight', sans-serif; width: 100%; margin-top: 8px; -webkit-tap-highlight-color: transparent; }

/* CHARACTER LOCK BOX */
.char-lock { background: #060a12; border: 1px solid rgba(200,168,75,0.2); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.char-lock-title { font-size: 9px; font-weight: 700; color: #C8A84B; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.char-lock-row { font-size: 11px; color: #7aadcc; line-height: 1.6; }
.char-lock-row strong { color: #fff; }

/* STAT BOXES */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat { background: rgba(200,168,75,0.08); border: 1px solid rgba(200,168,75,0.15); border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -1px; }
.stat-label { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

/* ITEMS */
.item { display: flex; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 8px; }
.item::before { content: '—'; color: #C8A84B; flex-shrink: 0; font-weight: 700; }

/* CALENDAR */
.cal-week { margin-bottom: 16px; }
.cal-week-title { font-size: 10px; font-weight: 700; color: #C8A84B; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; }
.cal-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 11px; }
.cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.cal-day { font-size: 9px; color: rgba(255,255,255,0.4); width: 24px; flex-shrink: 0; margin-top: 1px; }
</style>

// ─── RENDER ───
function render() {
  try {
  const content = document.getElementById('main-content');
  
  // Update tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === currentView);
  });

  if (currentView === 'brand') content.innerHTML = renderBrand();
  else if (currentView === 'marcos') content.innerHTML = renderMarcos();
  else if (currentView === 'cal') content.innerHTML = renderCalendar();
  else if (currentView === 'reels') content.innerHTML = renderReels();
  else if (currentView === 'carruseles') content.innerHTML = renderCarousels();
  else if (currentView === 'trailer') content.innerHTML = renderTrailer();
  
  content.scrollTop = 0;
  if (currentView==='marcos') setTimeout(setupMarcosBtn,50);
  var dbg = document.getElementById('debug-overlay');
  if (dbg) dbg.textContent = 'OK: ' + currentView + ' | CS:' + Object.keys(CS).length;
  } catch(err) {
    document.getElementById('main-content').innerHTML = '<div style="padding:20px;color:#E74C3C;font-family:monospace;font-size:12px;background:#1a0a0a;border-radius:8px;margin:16px"><strong>JS ERROR:</strong><br>' + err.message + '<br><br>' + (err.stack||'').substring(0,300) + '</div>';
    var dbg = document.getElementById('debug-overlay');
    if (dbg) dbg.textContent = 'ERROR: ' + err.message;
  }
}

// ─── ACTIONS ───
function toggleReel(id) {
  if (openReelId === id) {
    openReelId = null;
  } else {
    openReelId = id;
    openReelTab = 'script';
  }
  render();
  if (openReelId) {
    setTimeout(() => {
      const el = document.querySelector('.reel-body.open');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function switchReelTab(tab, reelId) {
  event.stopPropagation();
  openReelTab = tab;
  // Just re-render the body content without full render
  const reel = REELS.find(r => r.id === reelId);
  const body = document.querySelector('.reel-body.open');
  if (body) {
    body.querySelectorAll('.inner-tab').forEach((t,i) => {
      t.classList.toggle('active', ['script','frames','veo3'][i] === tab);
    });
    const tabContent = body.querySelector('.inner-tabs + *');
    if (tabContent) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = renderReelTab(reel);
      const newTabContent = tempDiv.querySelector('.inner-tabs + *') || tempDiv.firstChild;
      // Replace everything after inner-tabs
      const innerTabs = body.querySelector('.inner-tabs');
      let next = innerTabs.nextSibling;
      while (next) {
        const toRemove = next;
        next = next.nextSibling;
        body.removeChild(toRemove);
      }
      tempDiv.querySelectorAll('.inner-tabs ~ *').forEach ? null : null;
      // Easier: just set innerHTML of what follows
      const wrapper = document.createElement('div');
      wrapper.innerHTML = renderReelTab(reel);
      // Remove inner-tabs from wrapper
      const wrapperTabs = wrapper.querySelector('.inner-tabs');
      if (wrapperTabs) wrapperTabs.remove();
      while (wrapper.firstChild) body.appendChild(wrapper.firstChild);
    }
  }
}

function toggleCarousel(id) {
  openCarouselId = openCarouselId === id ? null : id;
  render();
}

// ─── COPY SYSTEM (event delegation, no onclick strings) ───
const CS = {}; // copy store
let CSI = 0;   // index

function sc(text) { // storeCopy
  const k = 'k'+(++CSI);
  CS[k] = text;
  return k;
}

function doCopy(text, btn) {
  const orig = btn ? btn.textContent : '';
  const ok = () => { if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent=orig,1800);} };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(ok).catch(()=>fbCopy(text,ok));
  } else { fbCopy(text, ok); }
}

function fbCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.readOnly = true;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select(); ta.setSelectionRange(0,99999);
  try { document.execCommand('copy'); if(done)done(); } catch(e){}
  document.body.removeChild(ta);
}

// Single event listener handles ALL copy buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-k]');
  if (!btn) return;
  e.preventDefault();
  var k = btn.getAttribute('data-k');
  var text = CS[k] || '';
  var dbg = document.getElementById('debug-overlay');
  if (dbg) dbg.textContent = 'Click: k=' + k + ' text=' + (text?text.substring(0,30):'EMPTY') + ' CS_size=' + Object.keys(CS).length;
  doCopy(text, btn);
});

// Legacy functions kept for compatibility
function storeCopy(t){ return sc(t); }
function copyFromData(btn){ const k=btn.getAttribute('data-copy')||btn.getAttribute('data-k'); doCopy(CS[k]||'',btn); }
function copyText(btn,text){ doCopy(text,btn); }

function copyAllFramePrompts(reelId) {
  const r = REELS.find(r => r.id === reelId);
  if (!r) return;
  const text = r.frames.map((f,i) => `--- FRAME ${i+1}: ${f.label} ---\nPhotorealistic vertical 9:16 portrait. Spanish man early 40s, dark brown short hair natural volume, 3-5 day beard, thin dark metal square-round glasses, olive Mediterranean skin. Wearing ${r.outfit}. ${f.gesture}. Saying: "${f.dialogue}". Camera chest height slightly below eye level, no tripod visible, soft bokeh, warm summer natural light. Authentic talking-head, photorealistic.`).join('\n\n');
  copyText(event.target, text);
}

function copyAllSlides(carouselId) {
  const c = CAROUSELS.find(c => c.id === carouselId);
  if (!c) return;
  const text = c.slides.map((s,i) => `SLIDE ${i+1} — ${s.label}\nHEADLINE: ${s.headline}\nSUBTEXT: ${s.sub}${s.cta?'\nCTA: '+s.cta:''}`).join('\n\n');
  copyText(event.target, text);
}
